<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padel Cities</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #EDEAE3;
      --charcoal: #4A4743;
      --charcoal-light: #7A7572;
      --black: #1C1A18;
      --white: #FAFAF8;
      --mid-grey: #888380;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--cream);
      color: var(--charcoal);
    }

    .page {
      height: 100vh;
      width: 100vw;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 2rem 3rem 1.5rem;
      z-index: 10;
      animation: fadeDown 0.8s ease both;
    }

    .logo-text {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.4rem, 1.72vw, 1.72rem);
      letter-spacing: -0.05em;
      text-transform: uppercase;
      color: var(--charcoal);
      font-weight: 400;
    }

    .nav-instagram {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(0.975rem, 1.17vw, 1.17rem);
      letter-spacing: 0.02em;
      color: var(--charcoal-light);
      text-decoration: none;
      transition: color 0.3s ease;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.4em;
    }
    .nav-instagram:hover { color: var(--black); }

    .ig-icon {
      width: 1em;
      height: 1em;
      display: inline-block;
      flex-shrink: 0;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* MAIN */
    main {
      display: grid;
      grid-template-columns: 45% 1fr;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    /* no vertical rule */

    /* LEFT IMAGE */
    .col-image {
      padding: 0 2rem 0 3rem;
      overflow: hidden;
      animation: fadeUp 1s ease 0.2s both;
    }

    .image-frame {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .image-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* RIGHT CONTENT */
    .col-content {
      display: grid;
      grid-template-rows: 1fr 1fr;
      padding: 0 3rem 0 2.5rem;
      gap: 0;
      overflow: hidden;
    }

    .quote-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 1rem;
      animation: fadeUp 1s ease 0.4s both;
    }

    .quote-text {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.8rem, 3.5vw, 3.8rem);
      line-height: 1.08;
      color: var(--black);
      font-weight: 400;
      margin-bottom: 1.2rem;
      letter-spacing: -0.01em;
    }

    .quote-text em {
      font-style: italic;
      color: var(--charcoal-light);
    }

    .quote-subtext {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(0.85rem, 1.1vw, 1.05rem);
      line-height: 1.65;
      color: var(--charcoal-light);
      max-width: 38ch;
      font-style: italic;
    }

    /* JOIN THE CLUB */
    .subscription-section {
      background: var(--black);
      padding: clamp(2rem, 4vh, 4rem) clamp(1.5rem, 2.5vw, 2.5rem);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
      animation: fadeUp 1s ease 0.6s both;
      position: relative;
      overflow: hidden;
    }

    .subscription-headline {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.8rem, 3.5vw, 3.8rem);
      color: var(--white);
      font-weight: 400;
      line-height: 1.08;
      margin-bottom: 1.2rem;
      letter-spacing: -0.01em;
    }

    .subscription-headline strong {
      font-style: italic;
      font-weight: 400;
    }

    .subscription-subtext {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(0.85rem, 1.1vw, 1.05rem);
      color: rgba(255,255,255,0.6);
      font-style: italic;
      line-height: 1.65;
      max-width: 38ch;
    }

    .subscription-form {
      display: flex;
      gap: 0;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .subscription-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-right: none;
      padding: 0.75rem 1.1rem;
      font-family: 'Instrument Serif', serif;
      font-size: 0.95rem;
      color: var(--white);
      outline: none;
      flex: 1;
      transition: border-color 0.3s ease, background 0.3s ease;
    }

    .subscription-input::placeholder {
      color: rgba(255,255,255,0.45);
      font-style: italic;
    }

    .subscription-input:focus {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.1);
    }

    .subscription-btn {
      background: var(--white);
      border: 1px solid var(--white);
      color: var(--black);
      padding: 0.75rem 1.4rem;
      font-family: 'Instrument Serif', serif;
      font-size: clamp(0.75rem, 0.9vw, 0.9rem);
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      white-space: nowrap;
      font-style: italic;
    }

    .subscription-btn:hover {
      background: transparent;
      color: var(--white);
      border-color: rgba(255,255,255,0.5);
    }

    .subscription-feedback {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(0.8rem, 1vw, 0.95rem);
      font-style: italic;
      color: rgba(255,255,255,0.6);
      min-height: 1.2em;
    }
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      z-index: 10;
      animation: fadeDown 0.8s ease 0.1s both;
    }

    .copyright {
      font-family: 'Instrument Serif', serif;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      color: var(--charcoal-light);
    }

    .issue-info {
      font-family: 'Instrument Serif', serif;
      font-size: 0.8rem;
      color: var(--charcoal-light);
      font-style: italic;
    }

    /* ANIMATIONS */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }

      .page {
        height: auto;
        min-height: 100vh;
        overflow: visible;
        grid-template-rows: auto auto auto;
      }

      header {
        padding: 1.5rem 1.5rem 1rem;
      }

      .nav-instagram { display: none; }

      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        height: auto;
        overflow: visible;
      }

      /* Hide the image column on mobile — it becomes the subscription bg */
      .col-image {
        display: none;
      }

      .col-content {
        order: 1;
        padding: 0.5rem 1.5rem 0;
        grid-template-rows: auto auto;
        gap: 0;
      }

      .quote-text {
        font-size: clamp(2.5rem, 11vw, 3.5rem);
      }

      .quote-subtext {
        font-size: clamp(1.05rem, 4vw, 1.3rem);
      }

      /* Subscription uses image.jpg as background */
      .subscription-section {
        position: relative;
        background-image: url('image.jpg');
        background-size: cover;
        background-position: center;
        min-height: 70vw;
        padding: 2.5rem 1.5rem;
      }

      .subscription-section::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(20, 18, 16, 0.72);
        z-index: 0;
      }

      .subscription-copy,
      .subscription-form,
      .subscription-feedback {
        position: relative;
        z-index: 1;
      }

      .subscription-headline {
        font-size: clamp(2.25rem, 10vw, 3.2rem);
      }

      .subscription-subtext {
        font-size: clamp(1.05rem, 4vw, 1.3rem);
        color: rgba(255,255,255,0.7);
      }

      .subscription-form { width: 100%; }

      .subscription-input {
        flex: 1;
        width: 100%;
        font-size: 1.05rem;
      }

      .subscription-btn {
        font-size: 0.95rem;
      }

      footer {
        padding: 1.2rem 1.5rem;
      }

      .issue-info { display: none; }

      .footer-instagram {
        font-family: 'Instrument Serif', serif;
        font-size: 1.05rem;
        letter-spacing: 0.02em;
        color: var(--charcoal);
        font-style: italic;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.4em;
      }

      .copyright {
        font-size: 1rem;
      }
    }

    @media (min-width: 769px) {
      .footer-instagram { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <span class="logo-text">Padel Cities</span>
      <a href="https://www.instagram.com/padelcities" target="_blank" rel="noopener" class="nav-instagram">
        <svg class="ig-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
        Instagram
      </a>
    </header>

    <main>

      <div class="col-image">
        <div class="image-frame">
          <img src="image.jpg" alt="Padel Cities" class="image-photo" />
        </div>
      </div>

      <div class="col-content">

        <div class="quote-section">
          <h1 class="quote-text">Explore the world,<br>one padel city<br><em>at a time.</em></h1>
          <p class="quote-subtext">Curating the best spots and culture on the global tour.</p>
        </div>

        <div class="subscription-section">
          <div class="subscription-copy">
            <p class="subscription-headline">Your next<br><strong>destination awaits.</strong></p>
            <p class="subscription-subtext">Courts, hotels, restaurants — hand-picked from the world's best padel cities, straight to your inbox.</p>
          </div>
          <div class="subscription-form">
            <input class="subscription-input" type="email" placeholder="your@email.com" />
            <button class="subscription-btn">Join Now</button>
          </div>
          <!-- Honeypot: hidden from humans, bots fill this in -->
          <input type="text" name="website" id="honeypot" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;" />
          <p class="subscription-feedback"></p>
        </div>

      </div>
    </main>

    <footer>
      <span class="copyright">&copy; 2026 Padel Cities</span>
      <a href="https://www.instagram.com/padelcities" target="_blank" rel="noopener" class="footer-instagram">
        <svg class="ig-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
        Instagram
      </a>
    </footer>

  </div>

  <script>
    const btn = document.querySelector('.subscription-btn');
    const input = document.querySelector('.subscription-input');
    const feedback = document.querySelector('.subscription-feedback');
    const honeypot = document.querySelector('#honeypot');
    const loadTime = Date.now();

    btn.addEventListener('click', async () => {
      // Honeypot check — bots fill hidden fields
      if (honeypot.value.length > 0) return;

      // Timing check — humans take at least 2 seconds to fill a form
      if (Date.now() - loadTime < 2000) return;

      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        feedback.style.color = 'rgba(255,255,255,0.5)';
        feedback.textContent = 'Please enter a valid email address.';
        return;
      }

      btn.textContent = '...';
      btn.disabled = true;

      try {
        const res = await fetch('https://curly-pond-0efb.padelcities.workers.dev/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });

        if (res.ok) {
          input.style.display = 'none';
          btn.style.display = 'none';
          feedback.style.color = 'rgba(255,255,255,0.75)';
          feedback.style.fontStyle = 'italic';
          feedback.textContent = 'You\'re in. Welcome to Padel Cities.';
        } else {
          feedback.style.color = 'rgba(255,255,255,0.5)';
          feedback.textContent = 'Something went wrong. Please try again.';
          btn.textContent = 'Join Now';
          btn.disabled = false;
        }
      } catch (e) {
        feedback.style.color = 'rgba(255,255,255,0.5)';
        feedback.textContent = 'Something went wrong. Please try again.';
        btn.textContent = 'Join Now';
        btn.disabled = false;
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
